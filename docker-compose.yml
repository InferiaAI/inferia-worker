# docker-compose.yml — inferia-worker, single service.
#
# On a GPU host with Docker + NVIDIA Container Toolkit installed:
#   cp .env.sample .env             # fill in values
#   docker compose up -d --build    # build + start
#   docker compose logs -f worker   # tail logs
#
# The worker registers with the URL in CONTROL_PLANE_URL, exchanges the
# bootstrap token for a long-lived JWT (persisted in the worker-state
# volume), and starts heartbeating + accepting model load commands.
#
# That's it. No companion services. The worker is one Go binary.

services:
  worker:
    build:
      context: .
    image: inferia-worker:local
    container_name: inferia-worker
    restart: unless-stopped

    environment:
      CONTROL_PLANE_URL:          ${CONTROL_PLANE_URL}
      BOOTSTRAP_TOKEN:            ${BOOTSTRAP_TOKEN}
      NODE_NAME:                  ${NODE_NAME}
      POOL_ID:                    ${POOL_ID}
      WORKER_ADVERTISE_URL:       ${WORKER_ADVERTISE_URL}
      INFERENCE_TOKEN:            ${INFERENCE_TOKEN}
      WORKER_LISTEN_ADDR:         ${WORKER_LISTEN_ADDR:-0.0.0.0:8080}
      LOG_LEVEL:                  ${LOG_LEVEL:-info}
      PULL_TIMEOUT_SECONDS:       ${PULL_TIMEOUT_SECONDS:-600}
      READINESS_TIMEOUT_SECONDS:  ${READINESS_TIMEOUT_SECONDS:-180}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-5}
      MODELS_NETWORK:             ${MODELS_NETWORK:-inferia-models}

    # Required volumes:
    #   - /var/run/docker.sock : worker launches sibling model containers on the host.
    #   - worker-state         : persists the worker JWT across restarts.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - worker-state:/var/lib/inferia-worker

    # Inference port exposed to the local network. The control plane reaches
    # the worker at WORKER_ADVERTISE_URL which must terminate here.
    ports:
      - "${INFERENCE_PORT:-8080}:8080"

    # If CONTROL_PLANE_URL points at a service on the host (e.g.
    # http://localhost:<port>) you'll want host.docker.internal to resolve:
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # GPU access for the worker container itself is not required — it never
    # runs CUDA code, only launches sibling containers that get --gpus passed
    # through via the Docker SDK. Uncomment to also expose GPUs to the worker
    # process itself (for nvidia-smi-based telemetry from inside the container):
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  worker-state:
    driver: local

# Note: the 'inferia-models' Docker network used by sibling model containers
# is created by the worker on startup (idempotent). Not declared here so
# 'docker compose down -v' doesn't drop it while model containers are still
# attached.
